services:
  postgres:
    image: postgres:16
    container_name: data_agent_postgres
    restart: always
    environment:
      POSTGRES_USER: data_agent
      POSTGRES_PASSWORD: data_agent_pwd
      POSTGRES_DB: data_agent_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: data_agent_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
